title: Poster
author: F. Cecillon
version: 1.0.0
quarto-required: ">=1.8.0"
contributes:
  formats:
    html:
      template: poster-html/template.html

      #Styles (screen and print)
      css:
        - poster-html/poster.css
        - poster-html/poster-print.css
      
      #Lua filters for "smart" behavior (key-messages, optional references, etc)
      filters:
        - poster-html/poster.lua
      
      #Default options for this format
      toc: false
      number-sections: false
      code-fold: false
      #link-external-icons: false
      smooth-scroll: false
      #embed-resources: false

